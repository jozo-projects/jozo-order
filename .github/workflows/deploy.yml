name: Build and Deploy to Staging/Production

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      GIT_SHA: ${{ steps.get_sha.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Inject environment variables
        run: printf '%s' "${{ secrets.ENV }}" > .env

      - name: Get short SHA
        id: get_sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/jozo-order:${{ steps.get_sha.outputs.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/jozo-order:${{ steps.get_sha.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            printf '%s' "${{ secrets.ENV }}" > .env
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/jozo-order:${{ needs.build.outputs.GIT_SHA }}
            docker stop jozo-order || true
            docker rm jozo-order || true
            docker run -d \
              --name jozo-order \
              --env-file .env \
              -e PORT=3004 \
              -p 3004:3004 \
              ${{ secrets.DOCKER_USERNAME }}/jozo-order:${{ needs.build.outputs.GIT_SHA }}
